app = "roza-polls"
primary_region = "fra"

[build]

[env]
  DATA_DIR = "/data"
  PORT = "8050"

[http_service]
  internal_port = 8050
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "polls_data"
  destination = "/data"
  initial_size = "1gb"
